<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusID - Dashboard</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="icon" type="image/png" href="../Images/IconNexusID.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="container header-content">
            <div class="logo">
                Nexus<span>ID</span>
            </div>
            
            <div class="user-profile">
                <span id="username-display"></span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="dashboard-header">
            <div>
                <h1>Dashboard de Produtos</h1>
                <p>Gerencie as listagens da plataforma</p>
            </div>
            <button class="btn-primary" id="btn-create"><span>+</span> Novo Produto</button>
        </section>

        <div id="products-grid" class="grid-container">
            
            <article class="product-card">
            </article>

        </div>
    </main>

    <div id="modal-container" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <header class="modal-header">
            <h2>Cadastrar Novo Produto</h2>
            <button id="btn-close-modal">&times;</button>
        </header>
        
        <form id="form-create-product">
            <div class="form-group">
                <label for="p-name">Nome do Produto</label>
                <input type="text" id="p-name" required placeholder="Ex: MacBook Pro">
            </div>

            <div class="form-group">
                <label for="p-price">Preço (R$)</label>
                <input type="number" step="0.01" id="p-price" required placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="p-phone">Telefone de Contato</label>
                <input type="tel" id="p-phone" required placeholder="(00) 00000-0000">
            </div>

            <div class="form-group">
                <label for="p-desc">Descrição</label>
                <textarea id="p-desc" rows="3" placeholder="Detalhes do produto..." required></textarea>
            </div>

            <button type="submit" class="btn-save">Salvar Produto</button>
        </form>
    </div>
</div>

    <script src="../scripts/dashboard.js"></script>
</body>
</html>
