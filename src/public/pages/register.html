<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles/register.css">
  <link rel="icon" type="image/png" href="../Images/IconNexusID.png">
  <title>NexusID - Registrar</title>
</head>

<body>
  <main class="container">
    <h1 class="brand-name">Nexus<span>ID</span></h1>

    <div class="avatar-circle">
      <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <line x1="20" y1="8" x2="20" y2="14"></line>
        <line x1="17" y1="11" x2="23" y2="11"></line>
      </svg>
    </div>

    <p id="error" class="hidden"></p>

    <section class="glass-card">
      <form id="register-form">
        <div class="input-group">
          <div class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <input type="text" id="username" name="username" placeholder="Nome de Usuário" required />
        </div>

        <div class="input-group">
          <div class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <input type="password" id="password" name="password" placeholder="Senha" required />
        </div>
        
        <p class="terms-text">Ao se registrar, você concorda com nossos <strong>Termos e Privacidade</strong>.</p>

        <button type="submit" class="btn-action">CRIAR CONTA</button>
      </form>
    </section>

    <p class="switch-text">Já possui conta? <a href="./login">Fazer Login</a></p>
  </main>

  <script src="../scripts/register.js"></script>
</body>
</html>
